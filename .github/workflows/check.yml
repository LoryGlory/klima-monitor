name: klima-monitor

on:
  schedule:
    # Every 5 min (GitHub may delay 5-15 min in practice under load).
    - cron: "*/5 * * * *"
  workflow_dispatch:

# Prevent overlapping runs from corrupting state.db.
concurrency:
  group: klima-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install npm deps
        run: npm ci

      # Cache the Playwright browser binary so we don't redownload Chromium each run.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium (with deps)
        run: npx playwright install --with-deps chromium

      # Persist the "last seen InStock/OOS" memory across cron runs.
      # The unique key writes a fresh snapshot every run; restore-keys pulls in
      # the most recent prior snapshot at the start of the run.
      - name: Restore stock state
        uses: actions/cache@v4
        with:
          path: state.db
          key: klima-state-${{ github.run_id }}
          restore-keys: klima-state-

      - name: Check targets
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          MAX_PRICE_EUR: ${{ vars.MAX_PRICE_EUR }}
          JITTER_SECONDS: "3"
        run: npm run once
